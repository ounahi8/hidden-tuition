// ── Helpers ────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const monthStr = (d=new Date()) => d.toISOString().slice(0,7);
const fmtMoney = (n) => "TZS " + Math.round(n).toLocaleString("en-US");

// ── Shared UI components ───────────────────────────────────────────────────
function Pill({tone,children}){
  const map={good:{bg:COLORS.tealBg,fg:"#075452"},bad:{bg:COLORS.clayBg,fg:"#7A3A18"},neutral:{bg:"#EFEDE5",fg:COLORS.slate}};
  const c=map[tone]||map.neutral;
  return <span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12.5,fontWeight:600,padding:"3px 10px",borderRadius:999,background:c.bg,color:c.fg,whiteSpace:"nowrap",lineHeight:1.4}}>{children}</span>;
}
function Card({children,style}){
  return <div style={{background:COLORS.paperRaised,border:`1px solid ${COLORS.border}`,borderRadius:14,...style}}>{children}</div>;
}
function StatCard({label,value,sub,accent}){
  return <Card style={{padding:"16px 18px",flex:1,minWidth:140}}>
    <div style={{fontSize:12.5,color:COLORS.slate,fontWeight:600,letterSpacing:0.2}}>{label}</div>
    <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:26,fontWeight:600,color:accent||COLORS.ink,marginTop:6,fontVariantNumeric:"tabular-nums"}}>{value}</div>
    {sub&&<div style={{fontSize:12,color:COLORS.slate,marginTop:4}}>{sub}</div>}
  </Card>;
}
function NavItem({active,onClick,children,icon}){
  return <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left",padding:"10px 14px",borderRadius:10,border:"none",background:active?"rgba(255,255,255,0.12)":"transparent",color:active?"#FFFFFF":"rgba(255,255,255,0.62)",fontSize:14.5,fontWeight:active?600:500,cursor:"pointer"}}>
    <span style={{fontSize:16,width:18,textAlign:"center"}}>{icon}</span>{children}
  </button>;
}
function IconButton({onClick,label,children,danger}){
  return <button onClick={onClick} aria-label={label} style={{border:`1px solid ${COLORS.border}`,background:COLORS.paperRaised,color:danger?"#9A3412":COLORS.ink,borderRadius:8,width:32,height:32,display:"inline-flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>{children}</button>;
}

// ── Password gate ──────────────────────────────────────────────────────────
function PasswordGate({onUnlock}){
  const [pw,setPw]=React.useState("");
  const [err,setErr]=React.useState(false);
  const submit=()=>{ if(pw===SITE_PASSWORD){onUnlock();}else{setErr(true);setPw("");} };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",width:"100%"}}>
    <div style={{background:COLORS.paperRaised,border:`1px solid ${COLORS.border}`,borderRadius:16,padding:"40px 36px",maxWidth:360,width:"100%",textAlign:"center"}}>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:22,color:COLORS.ink,marginBottom:4}}>Hidden Education Center</div>
      <div style={{fontSize:13,color:COLORS.slate,marginBottom:28}}>Admin access only</div>
      <input className="input" type="password" placeholder="Enter password" value={pw}
        onChange={e=>{setPw(e.target.value);setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        style={{marginBottom:12,textAlign:"center",fontSize:16}} />
      {err&&<div style={{color:COLORS.clay,fontSize:13,marginBottom:8}}>Wrong password — try again</div>}
      <button className="btn-primary" onClick={submit} style={{width:"100%",padding:"10px 0",fontSize:15}}>Enter</button>
    </div>
  </div>;
}

// ── Form 5/6 Billing View ──────────────────────────────────────────────────
function F56Billing({students,setStudents,bills,setBills}){
  const [selectedStudent,setSelectedStudent]=React.useState(null);
  const [checkedTopics,setCheckedTopics]=React.useState({});
  // Expand all subject groups by default
  const defaultExpanded={};
  F56_CURRICULUM.forEach(g=>{defaultExpanded[`${g.subject}_${g.form}`]=true;});
  const [expanded,setExpanded]=React.useState(defaultExpanded);
  const [showAdd,setShowAdd]=React.useState(false);
  const [newS,setNewS]=React.useState({name:"",form:"Form Five",phone:""});
  const [formFilter,setFormFilter]=React.useState("All");
  const [billSaved,setBillSaved]=React.useState(false);

  const total=Object.values(checkedTopics).filter(Boolean).reduce((s,t)=>s+t.price,0);

  const selectStudent=(s)=>{
    setSelectedStudent(s);
    setCheckedTopics({});
    setExpanded({});
    setBillSaved(false);
  };

  const toggleTopic=(key,topic)=>{
    setCheckedTopics(prev=>({...prev,[key]:prev[key]?null:topic}));
  };

  const toggleExpand=(key)=>{
    setExpanded(prev=>({...prev,[key]:!prev[key]}));
  };

  const saveBill=()=>{
    const items=Object.values(checkedTopics).filter(Boolean);
    if(!items.length||!selectedStudent) return;
    const bill={
      id:Date.now(),studentId:selectedStudent.id,
      studentName:selectedStudent.name,date:todayStr(),
      items,total,paid:false
    };
    setBills(prev=>[bill,...prev]);
    setCheckedTopics({});
    setBillSaved(true);
  };

  const toggleBillPaid=(id)=>{
    setBills(prev=>prev.map(b=>b.id===id?{...b,paid:!b.paid}:b));
  };

  const addStudent=()=>{
    if(!newS.name.trim()) return;
    setStudents(prev=>[...prev,{id:Date.now(),...newS,name:newS.name.trim(),phone:newS.phone.trim()||"—",joined:todayStr()}]);
    setNewS({name:"",form:"Form Five",phone:""});
    setShowAdd(false);
  };

  const filteredCurriculum = formFilter==="All"
    ? F56_CURRICULUM
    : F56_CURRICULUM.filter(g=>g.form.includes(formFilter));

  const studentBills = selectedStudent ? bills.filter(b=>b.studentId===selectedStudent.id) : [];
  const totalOwed = studentBills.filter(b=>!b.paid).reduce((s,b)=>s+b.total,0);
  const totalPaid = studentBills.filter(b=>b.paid).reduce((s,b)=>s+b.total,0);

  return <div>
    <div style={{marginBottom:20}}>
      <h1 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:600,margin:0}}>Form 5 & 6 Billing</h1>
      <p style={{color:COLORS.slate,fontSize:13.5,margin:"4px 0 0"}}>Select a student, tick their topics, and save their bill.</p>
    </div>

    <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
      {/* Left: student list */}
      <div style={{width:240,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontWeight:600,fontSize:14}}>Students</span>
          <button className="btn-primary" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setShowAdd(!showAdd)}>+ Add</button>
        </div>

        {showAdd&&<Card style={{padding:14,marginBottom:10}}>
          <input className="input" placeholder="Full name" value={newS.name} onChange={e=>setNewS({...newS,name:e.target.value})} style={{marginBottom:8}} />
          <select className="input" value={newS.form} onChange={e=>setNewS({...newS,form:e.target.value})} style={{marginBottom:8}}>
            <option>Form Five</option><option>Form Six</option>
          </select>
          <input className="input" placeholder="Phone (optional)" value={newS.phone} onChange={e=>setNewS({...newS,phone:e.target.value})} style={{marginBottom:10}} />
          <div style={{display:"flex",gap:6}}>
            <button className="btn-primary" style={{fontSize:13,padding:"6px 12px"}} onClick={addStudent}>Save</button>
            <button className="btn-secondary" style={{fontSize:13,padding:"6px 12px"}} onClick={()=>setShowAdd(false)}>Cancel</button>
          </div>
        </Card>}

        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {students.map(s=>{
            const active=selectedStudent?.id===s.id;
            return <div key={s.id} onClick={()=>selectStudent(s)} style={{padding:"10px 14px",borderRadius:10,border:`1px solid ${active?COLORS.teal:COLORS.border}`,background:active?COLORS.tealBg:COLORS.paperRaised,cursor:"pointer"}}>
              <div style={{fontWeight:600,fontSize:13.5,color:active?COLORS.teal:COLORS.ink}}>{s.name}</div>
              <div style={{fontSize:12,color:COLORS.slate,marginTop:2}}>{s.form} · {s.phone}</div>
            </div>;
          })}
        </div>
      </div>

      {/* Right: topic selector or placeholder */}
      <div style={{flex:1}}>
        {!selectedStudent && <Card style={{padding:36,textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:12}}>←</div>
          <div style={{fontWeight:600,color:COLORS.ink,marginBottom:4}}>Select a student</div>
          <div style={{color:COLORS.slate,fontSize:13.5}}>Choose a student from the list to start adding topics to their bill.</div>
        </Card>}

        {selectedStudent && <>
          {/* Student summary */}
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            <StatCard label="Outstanding" value={fmtMoney(totalOwed)} accent={COLORS.clay} sub={`${studentBills.filter(b=>!b.paid).length} unpaid bill(s)`} />
            <StatCard label="Total Paid" value={fmtMoney(totalPaid)} accent={COLORS.teal} sub={`${studentBills.filter(b=>b.paid).length} paid bill(s)`} />
          </div>

          {/* Topic selector */}
          <Card style={{padding:18,marginBottom:16,maxHeight:"600px",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,paddingRight:10}}>
              <div style={{fontWeight:600,fontSize:15}}>{selectedStudent.name} — Select Topics</div>
              <div style={{display:"flex",gap:6}}>
                {["All","Five","Six"].map(f=>(
                  <button key={f} onClick={()=>setFormFilter(f)} style={{padding:"5px 12px",borderRadius:7,fontSize:12.5,fontWeight:600,cursor:"pointer",border:`1px solid ${formFilter===f?COLORS.teal:COLORS.border}`,background:formFilter===f?COLORS.tealBg:"white",color:formFilter===f?COLORS.teal:COLORS.ink}}>{f==="All"?"All Forms":`Form ${f}`}</button>
                ))}
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:8,paddingRight:4}}>
              {filteredCurriculum.map((group,gi)=>{
                const key=`${group.subject}_${group.form}`;
                const isOpen=expanded[key];
                const groupChecked=group.topics.filter(t=>checkedTopics[`${key}_${t.name}`]).length;
                return <div key={gi} style={{border:`1px solid ${COLORS.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div onClick={()=>toggleExpand(key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer",background:groupChecked>0?COLORS.tealBg:"white"}}>
                    <div>
                      <span style={{fontWeight:600,fontSize:13.5,color:COLORS.ink}}>{group.subject}</span>
                      <span style={{fontSize:12,color:COLORS.slate,marginLeft:8}}>{group.form}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      {groupChecked>0&&<span style={{fontSize:12,fontWeight:600,color:COLORS.teal}}>{groupChecked} selected</span>}
                      <span style={{fontSize:12,color:COLORS.slate}}>{isOpen?"▲":"▼"}</span>
                    </div>
                  </div>
                  {isOpen&&<div style={{borderTop:`1px solid ${COLORS.border}`}}>
                    {group.topics.map((t,ti)=>{
                      const tk=`${key}_${t.name}`;
                      const checked=!!checkedTopics[tk];
                      return <label key={ti} style={{display:"flex",alignItems:"center",padding:"9px 14px",cursor:"pointer",background:checked?"#F0FAF9":"white",borderBottom:ti<group.topics.length-1?`1px solid ${COLORS.border}`:"none",gap:10}}>
                        <input type="checkbox" checked={checked} onChange={()=>toggleTopic(tk,{...t,subject:group.subject,form:group.form})}
                          style={{width:16,height:16,accentColor:COLORS.teal,cursor:"pointer"}} />
                        <span style={{flex:1,fontSize:13.5,color:COLORS.ink}}>{t.name}</span>
                        <span style={{fontSize:13,fontWeight:600,color:checked?COLORS.teal:COLORS.slate,whiteSpace:"nowrap"}}>{fmtMoney(t.price)}</span>
                      </label>;
                    })}
                  </div>}
                </div>;
              })}
            </div>

            {/* Running total + save - below scrollable content */}
            <div style={{marginTop:16,padding:"14px 18px",background:COLORS.ink,borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>
                  {Object.values(checkedTopics).filter(Boolean).length} topic(s) selected
                </div>
                <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:700,color:"white",fontVariantNumeric:"tabular-nums"}}>
                  {fmtMoney(total)}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <button className="btn-primary" onClick={saveBill}
                  disabled={total===0}
                  style={{background:total>0?"#0F8B8D":"rgba(255,255,255,0.2)",color:"white",padding:"10px 20px",fontSize:14,opacity:total===0?0.5:1}}>
                  Save Bill
                </button>
                {billSaved&&<span style={{fontSize:12,color:"#6EDDD4"}}>✓ Bill saved!</span>}
              </div>
            </div>
          </Card>

          {/* Saved bills for this student */}
          {studentBills.length>0&&<Card style={{padding:4}}>
            <div style={{padding:"12px 16px 8px",fontWeight:600,fontSize:14,borderBottom:`1px solid ${COLORS.border}`}}>
              Bills for {selectedStudent.name}
            </div>
            <table>
              <thead><tr>
                <th>Date</th><th>Topics</th><th>Total</th><th>Status</th><th></th>
              </tr></thead>
              <tbody>
                {studentBills.map(b=>(
                  <tr key={b.id}>
                    <td style={{color:COLORS.slate,whiteSpace:"nowrap"}}>{b.date}</td>
                    <td style={{color:COLORS.slate,fontSize:12.5}}>
                      {b.items.map(i=>i.name).join(", ").slice(0,60)}{b.items.length>2?"…":""}
                    </td>
                    <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{fmtMoney(b.total)}</td>
                    <td>{b.paid?<Pill tone="good">Paid</Pill>:<Pill tone="bad">Unpaid</Pill>}</td>
                    <td>
                      <button className="mark-btn" onClick={()=>toggleBillPaid(b.id)}
                        style={{background:b.paid?COLORS.teal:COLORS.clay,color:"white",borderColor:"transparent",fontSize:12}}>
                        {b.paid?"Mark Unpaid":"Mark Paid"}
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>}
        </>}
      </div>
    </div>
  </div>;
}

  const toggleAttendance=(d,sid,status)=>setAttendance(prev=>({...prev,[attKey(d,sid)]:status}));

  const todayAttendance=React.useMemo(()=>{

  },[students,attendance,today]);
  const presentCount=todayAttendance.filter(s=>s.status==="present").length;
  const absentCount=todayAttendance.filter(s=>s.status==="absent").length;

  const monthPayments=React.useMemo(()=>students.map(s=>{
    const payData=payments[payKey(thisMonth,s.id)]||{paid:0,outstanding:0};
    return {...s,paid:payData.paid||0,outstanding:payData.outstanding||0};
  }),[students,payments,thisMonth]);
  const collected=monthPayments.reduce((sum,s)=>sum+s.paid,0);
  const outstanding=monthPayments.reduce((sum,s)=>sum+s.outstanding,0);
  const hasOutstanding=outstanding>0;

  // Combined outstanding list: Form 1-4 students with a manually-entered balance,
  // plus Form 5-6 students with unpaid bills.

    .filter(s=>s.outstanding>0)
    .map(s=>({id:`f14_${s.id}`,name:s.name,formLabel:"Form 1–4",phone:s.phone,balance:s.outstanding}));
  const outstandingF56=studentsF56
    .map(s=>{
      const owed=billsF56.filter(b=>b.studentId===s.id&&!b.paid).reduce((sum,b)=>sum+b.total,0);
      return {id:`f56_${s.id}`,name:s.name,formLabel:s.form,phone:s.phone,balance:owed};
    })
    .filter(s=>s.balance>0);
  const outstandingAll=[...outstandingF14,...outstandingF56].sort((a,b)=>b.balance-a.balance);
  const totalOutstandingAll=outstandingAll.reduce((sum,s)=>sum+s.balance,0);
  const filteredStudents=students.filter(s=>s.name.toLowerCase().includes(search.toLowerCase()));

  const addStudent=()=>{
    if(!newStudent.name.trim()||newStudent.subjects.length===0) return;
    setStudents(prev=>[...prev,{id:Date.now(),name:newStudent.name.trim(),subjects:newStudent.subjects,phone:newStudent.phone.trim()||"—",joined:todayStr()}]);
    setNewStudent({name:"",subjects:[],phone:""});
    setShowAddStudent(false);
  };
  const removeStudent=(id)=>setStudents(prev=>prev.filter(s=>s.id!==id));
  const addTopic=()=>{
    if(!newTopic.topic.trim()||!newTopic.teacher.trim()) return;

    setNewTopic({subject:SUBJECTS_F14[0],teacher:"",date:todayStr(),topic:""});

      .input{border:1px solid ${COLORS.border};border-radius:8px;padding:8px 12px;font-size:14px;width:100%;background:white;color:${COLORS.ink};}
      .mark-btn{border-radius:7px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;}
    `}</style>

    {/* Sidebar */}
    <div style={{width:225,background:COLORS.ink,padding:"22px 14px",display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
      <div style={{padding:"0 10px 22px"}}>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:17,color:"white",lineHeight:1.2}}>Hidden Education</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:2}}>Admin desk</div>
      </div>
      <div style={{fontSize:10.5,color:"rgba(255,255,255,0.35)",letterSpacing:"0.08em",fontWeight:600,padding:"0 14px 4px",textTransform:"uppercase"}}>Form 1–4</div>
      <NavItem active={view==="today"} onClick={()=>setView("today")} icon="◷">Today</NavItem>
      <NavItem active={view==="students"} onClick={()=>setView("students")} icon="◍">Students</NavItem>
      <NavItem active={view==="payments"} onClick={()=>setView("payments")} icon="◆">Payments</NavItem>
      <NavItem active={view==="topics"} onClick={()=>setView("topics")} icon="▤">Topics covered</NavItem>
      <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",margin:"10px 0"}} />

        </div>
      </div>
    </div>

    {/* Main content */}
    <div style={{flex:1,padding:"28px 32px",overflow:"auto"}}>

      {/* TODAY */}
      {view==="today"&&<div>

              <td style={{fontWeight:600}}>{s.name}</td>

              <td>

              </td>
              <td>
                <input type="number" value={s.outstanding} onChange={e=>setPaymentAmount(thisMonth,s.id,s.paid,parseInt(e.target.value)||0)}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>

          <div style={{display:"flex",gap:8}}>
            <button className="btn-primary" onClick={addTopic}>Save entry</button>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {topics.map(t=>(
            <Card key={t.id} style={{padding:"14px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontWeight:600}}>{t.subject}</span>
                  <span style={{color:COLORS.slate,fontSize:13}}>· {t.teacher}</span>
                </div>
                <span style={{color:COLORS.slate,fontSize:12.5}}>{t.date}</span>

            </Card>

          {topics.length===0&&<p style={{color:COLORS.slate,fontSize:14}}>Nothing logged yet.</p>}
        </div>
      </div>}

      {/* FORM 5/6 BILLING */}
      {view==="f56"&&<F56Billing students={studentsF56} setStudents={setStudentsF56} bills={billsF56} setBills={setBillsF56} />}

      {/* OUTSTANDING — combined across Form 1-4 and Form 5-6 */}
      {view==="outstanding"&&<div>
        <div style={{marginBottom:20}}>
          <h1 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:600,margin:0}}>Outstanding balances</h1>
          <p style={{color:COLORS.slate,fontSize:13.5,margin:"4px 0 0"}}>Everyone who still owes money, across all forms — sorted highest first.</p>
        </div>
        <div style={{display:"flex",gap:12,marginBottom:24}}>
          <StatCard label="Total outstanding" value={fmtMoney(totalOutstandingAll)} accent={COLORS.clay} sub={`${outstandingAll.length} students`} />
        </div>
        <Card style={{padding:4}}>
          <table><thead><tr><th>Student</th><th>Form</th><th>Phone</th><th>Outstanding</th></tr></thead>
          <tbody>{outstandingAll.map(s=>(
            <tr key={s.id}>
              <td style={{fontWeight:600}}>{s.name}</td>
              <td style={{color:COLORS.slate}}>{s.formLabel}</td>
              <td style={{color:COLORS.slate}}>{s.phone}</td>
              <td style={{fontWeight:600,color:"#9A3412"}}>{fmtMoney(s.balance)}</td>
            </tr>
          ))}
          {outstandingAll.length===0&&<tr><td colSpan="4" style={{color:COLORS.slate,textAlign:"center",padding:"20px"}}>Nobody has an outstanding balance right now. 🎉</td></tr>}
          </tbody></table>
        </Card>
      </div>}

    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
